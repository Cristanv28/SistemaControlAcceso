<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Control de Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container-fluid">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4 header-bar">

        <div class="d-flex align-items-center gap-3">
            <div class="logo-icon">
                <img src="img/Logo.png" alt="Control de Acceso" class="logo-img">
            </div>
            <div>
                <h4 class="mb-0">Sistema de Control de Acceso</h4>
                <small style="color:#94a3b8;">Monitoreo en Tiempo Real</small>
            </div>
        </div>

        <div class="d-flex align-items-center gap-2">
            <span class="text-success me-2">● Activo</span>
            <a href="Usuarios.html" class="btn btn-success">👥 Usuarios</a>
            <a href="tarjetas.html" class="btn btn-primary">💳 Tarjetas</a>
            <a href="history.html" class="btn btn-secondary">🕒 Historial</a>
            <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#modalEmergencia"
                onclick="cargarCodigos()">
                🚨 MODO EMERGENCIA
            </button>
        </div>

    </div>

    <!-- BANNER EMERGENCIA (oculto por defecto) -->
    <div id="bannerEmergencia"
        class="alert text-white text-center fw-bold mb-4"
        style="display:none; font-size:1.2rem;">
    </div>

    <!-- STATS -->
    <div class="row g-4 mb-4">

        <div class="col-md-3">
            <div class="card stat-card">
                <div>
                    <p>Entradas Hoy</p>
                    <h2 class="text-success" id="accesos_hoy">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card stat-card">
                <div>
                    <p>Intentos Denegados</p>
                    <h2 class="text-warning" id="denegados_hoy">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card stat-card">
                <div>
                    <p>Estudiantes Activos</p>
                    <h2 id="statEstudiantes">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card stat-card">
                <div>
                    <p>Docentes Activos</p>
                    <h2 id="statDocentes">0</h2>
                </div>
            </div>
        </div>

    </div>

    <div class="row g-4">

        <!-- ACTIVIDAD RECIENTE -->
        <div class="col-md-8">
            <div class="card bg-dark text-white p-3">
                <h5>Registro en Tiempo Real</h5>
                <table class="table table-dark table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Tipo</th>
                            <th>Resultado</th>
                            <th>Fecha / Hora</th>
                        </tr>
                    </thead>
                    <tbody id="tablaActividad"></tbody>
                </table>
            </div>
        </div>

        <!-- CONTROL DE ACCESO -->
        <div class="col-md-4">
            <div class="card bg-dark text-white p-4">
                <h5>Control de Acceso</h5>

                <div class="form-check mt-2">
                    <input class="form-check-input" type="radio" name="modoAcceso" value="bloquear_entradas" id="r1">
                    <label class="form-check-label" for="r1">Bloquear Entradas</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="modoAcceso" value="bloquear_salidas" id="r2">
                    <label class="form-check-label" for="r2">Bloquear Salidas</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="modoAcceso" value="bloqueo_total" id="r3">
                    <label class="form-check-label" for="r3">Bloqueo Total</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="modoAcceso" value="normal" id="r4" checked>
                    <label class="form-check-label" for="r4">Normal (sin restricción)</label>
                </div>

                <button class="btn btn-danger w-100 mt-3" onclick="activarRestriccion()">
                    Activar Restricción
                </button>

                <div id="modoActualBadge" class="mt-2 text-center"></div>
            </div>
        </div>

    </div>

</div>

<!-- MODAL EMERGENCIA -->
<div class="modal fade" id="modalEmergencia">
    <div class="modal-dialog modal-lg">
        <div class="modal-content bg-dark text-white">

            <div class="modal-header">
                <h5>🚨 Modo Emergencia</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <div class="mb-3">
                    <label class="form-label">Código de emergencia:</label>
                    <select class="form-select" id="selectCodigo">
                        <option value="">-- Selecciona un código --</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipo:</label><br>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="tipoEmergencia" value="lockdown" id="teLockdown" checked>
                        <label class="form-check-label" for="teLockdown">🔒 Lockdown</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="tipoEmergencia" value="evacuacion" id="teEvacuacion">
                        <label class="form-check-label" for="teEvacuacion">🚪 Evacuación</label>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-danger flex-fill" onclick="activarEmergencia()">
                        🚨 Activar Emergencia
                    </button>
                    <button class="btn btn-secondary flex-fill" onclick="desactivarEmergencia()">
                        ✅ Desactivar Emergencia
                    </button>
                </div>

            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
