<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Historial de Accesos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>

<div class="container-fluid">

    <!-- HEADER -->
    <div class="header d-flex justify-content-between align-items-center">
        <div>
            <h3>🕒 Historial de Accesos</h3>
            <p>Registro completo de entradas y salidas</p>
        </div>
        <div class="d-flex gap-2">
            <a href="index.html" class="btn btn-secondary">← Volver al Dashboard</a>
            <button class="btn btn-success" onclick="downloadExcel()">⬇ Descargar Excel</button>
        </div>
    </div>

    <!-- FILTROS -->
    <div class="card bg-dark text-white p-4 mb-4">
        <h5 class="mb-3">Filtros</h5>
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Fecha</label>
                <input type="date" class="form-control" id="filterDate">
            </div>
            <div class="col-md-3">
                <label class="form-label">Tipo de Evento</label>
                <select class="form-select" id="filterType">
                    <option value="">Entrada / Salida</option>
                    <option value="entrada">Entrada</option>
                    <option value="salida">Salida</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Carrera</label>
                <input class="form-control" id="filterCareer" placeholder="Ej: Sistemas">
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-primary w-100" onclick="applyFilters()">Filtrar</button>
            </div>
        </div>
    </div>

    <!-- TABLA -->
    <div class="card bg-dark text-white p-3">
        <h5 class="mb-3">Registro de Entradas y Salidas</h5>
        <table class="table table-dark table-hover">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Matrícula</th>
                    <th>Carrera</th>
                    <th>Tipo</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/history.js"></script>

</body>
</html>
